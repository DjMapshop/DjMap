<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="grad_bar_club" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a18"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <filter id="glow_bar_club">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#grad_bar_club)"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#a78bfa" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#a78bfa" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L30 0 L0 30" fill="#a78bfa" opacity="0.15"/>
  <path d="M400 0 L370 0 L400 30" fill="#a78bfa" opacity="0.15"/>
  <path d="M0 280 L30 280 L0 250" fill="#a78bfa" opacity="0.15"/>
  <path d="M400 280 L370 280 L400 250" fill="#a78bfa" opacity="0.15"/>
  
  <!-- Icon -->
  <g filter="url(#glow_bar_club)">
    <rect x="170" y="70" width="8" height="80" rx="4" fill="#a78bfa" opacity="0.7"/>
<rect x="185" y="55" width="8" height="95" rx="4" fill="#a78bfa" opacity="0.5"/>
<rect x="200" y="45" width="8" height="105" rx="4" fill="#a78bfa" opacity="0.8"/>
<rect x="215" y="60" width="8" height="90" rx="4" fill="#a78bfa" opacity="0.5"/>
<rect x="230" y="75" width="8" height="75" rx="4" fill="#a78bfa" opacity="0.6"/>
<path d="M150 170 H260" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
<rect x="155" y="175" width="90" height="25" rx="4" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<circle cx="175" cy="188" r="6" fill="#c9a84c" opacity="0.4"/>
<circle cx="200" cy="188" r="6" fill="#c9a84c" opacity="0.4"/>
<circle cx="225" cy="188" r="6" fill="#c9a84c" opacity="0.4"/>
  </g>
  
  <!-- DJ MAP label -->
  <text x="20" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#a78bfa" opacity="0.5">DJ MAP</text>
  
  <!-- Type label -->
  <text x="200" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#a78bfa" text-anchor="middle" opacity="0.9">BAR & CLUB</text>
  
  <!-- Bottom line -->
  <line x1="80" y1="255" x2="320" y2="255" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
</svg>