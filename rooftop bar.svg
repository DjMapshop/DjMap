<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="grad_rooftop_bar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a00"/>
      <stop offset="100%" style="stop-color:#1a1200"/>
    </linearGradient>
    <filter id="glow_rooftop_bar">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#grad_rooftop_bar)"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#c9a84c" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#c9a84c" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L30 0 L0 30" fill="#c9a84c" opacity="0.15"/>
  <path d="M400 0 L370 0 L400 30" fill="#c9a84c" opacity="0.15"/>
  <path d="M0 280 L30 280 L0 250" fill="#c9a84c" opacity="0.15"/>
  <path d="M400 280 L370 280 L400 250" fill="#c9a84c" opacity="0.15"/>
  
  <!-- Icon -->
  <g filter="url(#glow_rooftop_bar)">
    <rect x="140" y="150" width="120" height="50" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<rect x="130" y="145" width="140" height="8" fill="#c9a84c" opacity="0.4"/>
<line x1="130" y1="150" x2="130" y2="200" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="270" y1="150" x2="270" y2="200" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="155" y1="145" x2="155" y2="100" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
<line x1="200" y1="145" x2="200" y2="90" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
<line x1="245" y1="145" x2="245" y2="100" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
<circle cx="200" cy="72" r="18" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
<circle cx="200" cy="72" r="6" fill="#c9a84c" opacity="0.5"/>
<path d="M80 200 H320" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
<path d="M60 205 H340" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>
  </g>
  
  <!-- DJ MAP label -->
  <text x="20" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#c9a84c" opacity="0.5">DJ MAP</text>
  
  <!-- Type label -->
  <text x="200" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#c9a84c" text-anchor="middle" opacity="0.9">ROOFTOP BAR</text>
  
  <!-- Bottom line -->
  <line x1="80" y1="255" x2="320" y2="255" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
</svg>