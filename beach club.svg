<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="grad_beach_club" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001830"/>
      <stop offset="100%" style="stop-color:#003060"/>
    </linearGradient>
    <filter id="glow_beach_club">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#grad_beach_club)"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#38bdf8" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#38bdf8" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L30 0 L0 30" fill="#38bdf8" opacity="0.15"/>
  <path d="M400 0 L370 0 L400 30" fill="#38bdf8" opacity="0.15"/>
  <path d="M0 280 L30 280 L0 250" fill="#38bdf8" opacity="0.15"/>
  <path d="M400 280 L370 280 L400 250" fill="#38bdf8" opacity="0.15"/>
  
  <!-- Icon -->
  <g filter="url(#glow_beach_club)">
    <path d="M80 160 Q200 90 320 160" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
<path d="M80 175 Q200 105 320 175" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.35"/>
<path d="M80 190 Q200 120 320 190" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
<circle cx="200" cy="75" r="35" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
<circle cx="200" cy="75" r="25" fill="#f59e0b" opacity="0.15"/>
<line x1="200" y1="40" x2="200" y2="25" stroke="#f59e0b" stroke-width="2"/>
<line x1="200" y1="110" x2="200" y2="125" stroke="#f59e0b" stroke-width="2"/>
<line x1="165" y1="75" x2="150" y2="75" stroke="#f59e0b" stroke-width="2"/>
<line x1="235" y1="75" x2="250" y2="75" stroke="#f59e0b" stroke-width="2"/>
<path d="M155 130 Q170 120 185 135 Q200 120 215 135 Q230 120 245 130" fill="none" stroke="#c9a84c" stroke-width="2"/>
  </g>
  
  <!-- DJ MAP label -->
  <text x="20" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#38bdf8" opacity="0.5">DJ MAP</text>
  
  <!-- Type label -->
  <text x="200" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#38bdf8" text-anchor="middle" opacity="0.9">BEACH CLUB</text>
  
  <!-- Bottom line -->
  <line x1="80" y1="255" x2="320" y2="255" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
</svg>