<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="grad_restaurant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#180800"/>
      <stop offset="100%" style="stop-color:#280e00"/>
    </linearGradient>
    <filter id="glow_restaurant">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#grad_restaurant)"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#fb923c" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#fb923c" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L30 0 L0 30" fill="#fb923c" opacity="0.15"/>
  <path d="M400 0 L370 0 L400 30" fill="#fb923c" opacity="0.15"/>
  <path d="M0 280 L30 280 L0 250" fill="#fb923c" opacity="0.15"/>
  <path d="M400 280 L370 280 L400 250" fill="#fb923c" opacity="0.15"/>
  
  <!-- Icon -->
  <g filter="url(#glow_restaurant)">
    <path d="M165 60 L165 120 Q165 135 180 135 Q195 135 195 120 L195 60" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.7"/>
<line x1="180" y1="60" x2="180" y2="135" stroke="#fb923c" stroke-width="1.5" opacity="0.4"/>
<line x1="215" y1="60" L215 90 Q215 100 220 100 L220 60" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.7"/>
<path d="M215 60 L215 90 Q215 105 222 105 L222 60" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.7"/>
<line x1="222" y1="105" x2="222" y2="135" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
<path d="M150 145 H250" stroke="#fb923c" stroke-width="1.5" opacity="0.4"/>
<rect x="165" y="155" width="70" height="40" rx="4" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="175" y1="165" x2="225" y2="165" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
<line x1="175" y1="175" x2="215" y2="175" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
<line x1="175" y1="185" x2="205" y2="185" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- DJ MAP label -->
  <text x="20" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#fb923c" opacity="0.5">DJ MAP</text>
  
  <!-- Type label -->
  <text x="200" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#fb923c" text-anchor="middle" opacity="0.9">RESTAURANT</text>
  
  <!-- Bottom line -->
  <line x1="80" y1="255" x2="320" y2="255" stroke="#fb923c" stroke-width="0.5" opacity="0.3"/>
</svg>