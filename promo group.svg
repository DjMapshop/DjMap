<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="grad_promo_group" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1800"/>
      <stop offset="100%" style="stop-color:#0f2800"/>
    </linearGradient>
    <filter id="glow_promo_group">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#grad_promo_group)"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#4ade80" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#4ade80" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L30 0 L0 30" fill="#4ade80" opacity="0.15"/>
  <path d="M400 0 L370 0 L400 30" fill="#4ade80" opacity="0.15"/>
  <path d="M0 280 L30 280 L0 250" fill="#4ade80" opacity="0.15"/>
  <path d="M400 280 L370 280 L400 250" fill="#4ade80" opacity="0.15"/>
  
  <!-- Icon -->
  <g filter="url(#glow_promo_group)">
    <circle cx="200" cy="95" r="22" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.7"/>
<circle cx="200" cy="95" r="8" fill="#4ade80" opacity="0.5"/>
<circle cx="150" cy="135" r="16" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
<circle cx="150" cy="135" r="6" fill="#4ade80" opacity="0.3"/>
<circle cx="250" cy="135" r="16" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
<circle cx="250" cy="135" r="6" fill="#4ade80" opacity="0.3"/>
<line x1="178" y1="110" x2="162" y2="125" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
<line x1="222" y1="110" x2="238" y2="125" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
<path d="M140 160 Q150 150 160 160" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<path d="M190 175 Q200 165 210 175" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<path d="M240 160 Q250 150 260 160" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- DJ MAP label -->
  <text x="20" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#4ade80" opacity="0.5">DJ MAP</text>
  
  <!-- Type label -->
  <text x="200" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#4ade80" text-anchor="middle" opacity="0.9">PROMO GROUP</text>
  
  <!-- Bottom line -->
  <line x1="80" y1="255" x2="320" y2="255" stroke="#4ade80" stroke-width="0.5" opacity="0.3"/>
</svg>