<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="grad_nightclub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010"/>
      <stop offset="100%" style="stop-color:#1a0030"/>
    </linearGradient>
    <filter id="glow_nightclub">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#grad_nightclub)"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#c9a84c" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#c9a84c" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L30 0 L0 30" fill="#c9a84c" opacity="0.15"/>
  <path d="M400 0 L370 0 L400 30" fill="#c9a84c" opacity="0.15"/>
  <path d="M0 280 L30 280 L0 250" fill="#c9a84c" opacity="0.15"/>
  <path d="M400 280 L370 280 L400 250" fill="#c9a84c" opacity="0.15"/>
  
  <!-- Icon -->
  <g filter="url(#glow_nightclub)">
    <circle cx="200" cy="110" r="40" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
<line x1="200" y1="70" x2="200" y2="30" stroke="#c9a84c" stroke-width="2"/>
<circle cx="200" cy="110" r="8" fill="#c9a84c"/>
<line x1="168" y1="88" x2="140" y2="70" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="232" y1="88" x2="260" y2="70" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="160" y1="110" x2="120" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="240" y1="110" x2="280" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="168" y1="132" x2="140" y2="150" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<line x1="232" y1="132" x2="260" y2="150" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
<rect x="160" y="160" width="80" height="6" rx="3" fill="#c9a84c" opacity="0.3"/>
<rect x="170" y="173" width="60" height="5" rx="2.5" fill="#c9a84c" opacity="0.2"/>
  </g>
  
  <!-- DJ MAP label -->
  <text x="20" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#c9a84c" opacity="0.5">DJ MAP</text>
  
  <!-- Type label -->
  <text x="200" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#c9a84c" text-anchor="middle" opacity="0.9">NIGHTCLUB</text>
  
  <!-- Bottom line -->
  <line x1="80" y1="255" x2="320" y2="255" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
</svg>