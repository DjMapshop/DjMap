<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DJ MAP — Venue Guide Asia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold2: #8b6914;
    --bg: #08080f;
    --bg2: #0f0f18;
    --bg3: #1a1a2e;
    --text: #ffffff;
    --muted: #444;
    --muted2: #333;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--bg3);
  }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
  .logo-name { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
  .pro-badge {
    background: var(--gold);
    color: #000;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .venue-count {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }

  /* LOADING */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 20px; gap: 16px; color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--bg3);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FILTERS */
  .filters { padding: 12px 20px 8px; }
  .filter-row { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--bg2); border: 1px solid var(--bg3);
    color: var(--muted); border-radius: 20px;
    padding: 6px 14px; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--gold); border-color: var(--gold);
    color: #000;
  }

  /* SEARCH */
  .search-wrap { padding: 0 20px 10px; }
  .search-input {
    width: 100%; background: var(--bg2); border: 1px solid var(--bg3);
    color: var(--text); border-radius: 12px; padding: 10px 14px;
    font-size: 14px; outline: none;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--gold); }

  /* COUNTRY GRID */
  .section-title {
    padding: 4px 20px 12px;
    font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }
  .country-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; padding: 0 20px;
  }
  .country-card {
    background: var(--bg2); border: 1px solid var(--bg3);
    border-radius: 14px; padding: 18px 8px;
    text-align: center; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .country-card:active { transform: scale(0.97); }
  .country-card:hover { border-color: var(--gold); }
  .country-flag { font-size: 28px; margin-bottom: 6px; }
  .country-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
  .country-count { font-size: 12px; font-weight: 700; color: var(--gold); }

  /* BACK BTN */
  .back-btn {
    background: #ffffff12; border: none; color: var(--muted);
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
    font-size: 12px; font-weight: 600;
  }
  .view-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px 10px;
  }
  .view-title { font-size: 15px; font-weight: 800; }

  /* VENUE CARDS */
  .venues-list { padding: 0 20px; }
  .venue-card {
    background: var(--bg2); border: 1px solid var(--bg3);
    border-radius: 14px; margin-bottom: 12px;
    cursor: pointer; overflow: hidden;
    transition: border-color 0.15s;
  }
  .venue-card.premium { border-color: var(--gold) + "55"; }
  .venue-card:hover { border-color: var(--gold); }

  .venue-img {
    width: 100%; height: 160px; object-fit: cover;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: var(--muted2);
  }
  .venue-img-placeholder {
    width: 100%; height: 160px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: var(--muted2);
  }

  .venue-body { padding: 12px 14px; }
  .type-badge {
    display: inline-block;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px; margin-bottom: 5px;
  }
  .venue-name { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
  .venue-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .venue-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .tag {
    background: #ffffff0a; border: 1px solid var(--bg3);
    color: var(--muted); font-size: 10px; padding: 2px 8px; border-radius: 10px;
  }
  .venue-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 8px; border-top: 1px solid var(--bg3);
  }
  .fee { font-size: 11px; color: var(--gold); font-weight: 600; }
  .nights { font-size: 10px; color: var(--muted); }
  .rating-badge {
    background: var(--gold); color: #000;
    font-size: 11px; font-weight: 800;
    padding: 3px 8px; border-radius: 6px;
  }

  /* VENUE DETAIL */
  .detail-view { padding: 0 20px 20px; }
  .detail-hero {
    width: 100%; height: 220px; border-radius: 14px;
    background: var(--bg3); margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px; overflow: hidden;
  }
  .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
  .detail-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .detail-location { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .detail-section { margin-bottom: 14px; }
  .detail-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
  .detail-value { font-size: 13px; color: #ccc; }
  .contacts-block { background: var(--bg2); border-radius: 12px; overflow: hidden; }
  .contact-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-bottom: 1px solid var(--bg3);
    text-decoration: none; color: inherit;
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-icon { font-size: 18px; width: 24px; flex-shrink: 0; }
  .contact-info { flex: 1; }
  .contact-type { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .contact-val { font-size: 13px; color: #ccc; font-weight: 500; }
  .arrow { color: var(--muted2); font-size: 14px; }

  /* SAVED */
  .save-btn {
    background: none; border: none; font-size: 20px;
    cursor: pointer; color: var(--gold);
  }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted2);
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: #0a0a10; border-top: 1px solid var(--bg3);
    display: flex; padding: 8px 0 env(safe-area-inset-bottom, 12px);
    z-index: 200;
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--muted2); padding: 4px 0;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.3px; }

  /* RESULT COUNT */
  .result-count { padding: 0 20px 8px; font-size: 11px; color: var(--muted); }

  /* PRO BANNER */
  .pro-banner {
    margin: 0 20px 12px;
    background: linear-gradient(135deg, #1a1500, #0f0f18);
    border: 1px solid var(--gold);
    border-radius: 12px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .pro-banner-text { font-size: 12px; color: #ccc; }
  .pro-banner-text b { color: var(--gold); }
  .pro-cta {
    background: var(--gold); color: #000;
    border: none; border-radius: 8px;
    padding: 7px 14px; font-size: 11px; font-weight: 800;
    cursor: pointer; white-space: nowrap;
  }

  /* TEMPLATES */
  .templates-list { padding: 0 20px; }
  .template-card {
    background: var(--bg2); border: 1px solid var(--bg3);
    border-radius: 14px; padding: 16px; margin-bottom: 10px;
  }
  .template-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .template-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .template-copy {
    background: var(--gold); color: #000; border: none;
    border-radius: 8px; padding: 8px 16px; font-size: 12px;
    font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div><span>Загрузка...</span></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBfahfsaXAR4P83HclALQqaZO-C9MOKl7incfyzqGdrr2-kimGHeNTIQQgzJ-hv1NKlcpVqrTDz3d0/pub?output=csv";

const COUNTRIES = [
  { id: "Thailand",   name: "Таиланд",   flag: "🇹🇭", color: "#3b82f6" },
  { id: "Vietnam",    name: "Вьетнам",   flag: "🇻🇳", color: "#ef4444" },
  { id: "Cambodia",   name: "Камбоджа",  flag: "🇰🇭", color: "#8b5cf6" },
  { id: "India",      name: "Индия",     flag: "🇮🇳", color: "#f97316" },
  { id: "Malaysia",   name: "Малайзия",  flag: "🇲🇾", color: "#10b981" },
  { id: "Japan",      name: "Япония",    flag: "🇯🇵", color: "#ec4899" },
  { id: "China",      name: "Китай",     flag: "🇨🇳", color: "#ef4444" },
  { id: "Korea",      name: "Корея",     flag: "🇰🇷", color: "#6366f1" },
  { id: "Indonesia",  name: "Индонезия", flag: "🇮🇩", color: "#f59e0b" },
];

const TYPE_COLORS = {
  nightclub: "#a855f7",
  "beach club": "#10b981",
  bar: "#3b82f6",
  rooftop: "#f59e0b",
  lounge: "#ec4899",
  "music shop": "#3b82f6",
  "service center": "#d97706",
};

const TYPE_EMOJI = {
  nightclub: "🎵", "beach club": "🏖️", bar: "🍸",
  rooftop: "🌆", lounge: "🎶", "music shop": "🎸", "service center": "🔧"
};

const TEMPLATES = [
  { title: "Booking Request EN", desc: "Professional booking request email template", text: `Hello,\n\nMy name is [YOUR NAME], a professional DJ based in [CITY].\n\nI would like to inquire about booking availability for [DATE].\n\nGenres: [GENRES]\nMix examples: [SOUNDCLOUD/MIXCLOUD LINK]\n\nLooking forward to hearing from you.\n\nBest regards,\n[YOUR NAME]` },
  { title: "Booking Request TH 🇹🇭", desc: "Booking request in Thai for Thailand venues", text: `สวัสดีครับ/ค่ะ\n\nผม/หนูชื่อ [ชื่อ] เป็น DJ มืออาชีพจาก [เมือง]\n\nต้องการสอบถามเกี่ยวกับการจอง [วันที่]\n\nแนวดนตรี: [แนวเพลง]\n\nขอบคุณครับ/ค่ะ\n[ชื่อ]` },
  { title: "Follow-up Email", desc: "Follow up after no reply", text: `Hi,\n\nI'm following up on my previous booking request.\nI'd love to perform at [VENUE NAME] on [DATE].\n\nPlease let me know if you need any additional info.\n\nBest,\n[YOUR NAME]` },
  { title: "Rate Card", desc: "Template for your DJ rate card", text: `DJ [NAME] — Rate Card\n\n• 2h set: $[PRICE]\n• 3h set: $[PRICE]\n• 4h set: $[PRICE]\n\nIncludes: travel within [CITY]\nEquipment: [YOUR SETUP]\n\nContact: [EMAIL / WA]` },
];

// ─── STATE ────────────────────────────────────────────────
let state = {
  tab: "countries",        // countries | venues | service | saved | templates | account
  venues: [],
  loading: true,
  error: null,
  selectedCountry: null,
  selectedVenue: null,
  filterType: "All",
  filterCity: "All",
  search: "",
  saved: JSON.parse(localStorage.getItem("djmap_saved") || "[]"),
  isPro: false,
};

// ─── CSV PARSER ───────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => {
      let v = (vals[i] || "").replace(/^"|"$/g, "").trim();
      if (h === "rating" || h === "capacity") v = parseFloat(v) || 0;
      else if (h === "isPremium") v = v === "true" || v === "TRUE" || v === "1";
      else if (h === "genre" || h === "nights") v = v ? v.split(";").map(s => s.trim()).filter(Boolean) : [];
      obj[h] = v;
    });
    return obj;
  }).filter(o => o.name && String(o.name).trim());
}

// ─── DATA LOAD ────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(SHEET_CSV);
    const text = await res.text();
    state.venues = parseCSV(text);
    state.loading = false;
  } catch (e) {
    state.error = "Ошибка загрузки данных";
    state.loading = false;
  }
  render();
}

// ─── HELPERS ──────────────────────────────────────────────
function venuesForCountry(countryId) {
  return state.venues.filter(v =>
    String(v.country || "").trim().toLowerCase() === countryId.toLowerCase()
  );
}

function toggleSave(venue) {
  const idx = state.saved.findIndex(s => s.name === venue.name);
  if (idx === -1) state.saved.push(venue);
  else state.saved.splice(idx, 1);
  localStorage.setItem("djmap_saved", JSON.stringify(state.saved));
  render();
}

function isSaved(venue) {
  return state.saved.some(s => s.name === venue.name);
}

function typeColor(type) {
  return TYPE_COLORS[(type || "").toLowerCase()] || "#C9A84C";
}

function typeEmoji(type) {
  return TYPE_EMOJI[(type || "").toLowerCase()] || "🎵";
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ Скопировано";
    setTimeout(() => btn.textContent = "Скопировать", 1500);
  });
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = buildHTML();
  attachEvents();
}

function buildHTML() {
  if (state.loading) return `<div class="loading"><div class="spinner"></div><span>Загрузка данных...</span></div>`;
  if (state.error) return `<div class="loading"><div style="font-size:32px">⚠️</div><span>${state.error}</span></div>`;

  return `
    ${buildHeader()}
    ${buildContent()}
    ${buildBottomNav()}
  `;
}

function buildHeader() {
  const total = state.venues.length;
  return `
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">🎧</div>
      <div>
        <div class="logo-text">Venue Guide</div>
        <div class="logo-name">DJ MAP</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="venue-count"><span class="dot"></span>${total} venue</div>
      <div class="pro-badge">PRO</div>
    </div>
  </div>`;
}

function buildContent() {
  if (state.selectedVenue) return buildVenueDetail(state.selectedVenue);
  switch (state.tab) {
    case "countries": return buildCountries();
    case "venues":    return buildVenuesList();
    case "service":   return buildServiceList();
    case "saved":     return buildSaved();
    case "templates": return buildTemplates();
    case "account":   return buildAccount();
    default:          return buildCountries();
  }
}

// COUNTRIES
function buildCountries() {
  const cards = COUNTRIES.map(c => {
    const count = venuesForCountry(c.id).filter(v =>
      !["music shop","service center"].includes((v.type||"").toLowerCase())
    ).length;
    return `
    <div class="country-card" data-action="select-country" data-id="${c.id}">
      <div class="country-flag">${c.flag}</div>
      <div class="country-name">${c.name}</div>
      <div class="country-count" style="color:${c.color}">${count}</div>
    </div>`;
  }).join("");

  return `
    <div class="section-title">Выберите страну</div>
    <div class="country-grid">${cards}</div>`;
}

// VENUES LIST
function buildVenuesList() {
  const c = COUNTRIES.find(x => x.id === state.selectedCountry);
  if (!c) return buildCountries();

  let list = venuesForCountry(c.id).filter(v =>
    !["music shop","service center"].includes((v.type||"").toLowerCase())
  );

  const types = ["All", ...new Set(list.map(v => v.type).filter(Boolean))];
  const cities = ["All", ...new Set(list.map(v => v.city).filter(Boolean))];

  if (state.filterType !== "All") list = list.filter(v => v.type === state.filterType);
  if (state.filterCity !== "All") list = list.filter(v => v.city === state.filterCity);
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(v => (v.name||"").toLowerCase().includes(q) || (v.city||"").toLowerCase().includes(q));
  }

  const typeFilters = types.map(t => `<button class="filter-btn ${state.filterType===t?"active":""}" data-action="filter-type" data-val="${t}">${t==="All"?"Все":t}</button>`).join("");
  const cityFilters = cities.map(ci => `<button class="filter-btn ${state.filterCity===ci?"active":""}" data-action="filter-city" data-val="${ci}">${ci==="All"?"Все города":ci}</button>`).join("");

  const cards = list.length === 0
    ? `<div class="empty-state"><div class="emoji">${typeEmoji(state.filterType)}</div><p>Нет заведений</p></div>`
    : list.map(v => buildVenueCard(v)).join("");

  return `
    <div class="view-header">
      <button class="back-btn" data-action="back-countries">← Страны</button>
      <span class="view-title">${c.flag} ${c.name}</span>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="🔍 Поиск заведений..." value="${state.search}" data-action="search">
    </div>
    <div class="filters">
      <div class="filter-row">${typeFilters}</div>
      <div class="filter-row" style="margin-top:6px">${cityFilters}</div>
    </div>
    <div class="result-count">${list.length} заведений</div>
    <div class="venues-list">${cards}</div>`;
}

function buildVenueCard(v) {
  const color = typeColor(v.type);
  const emoji = typeEmoji(v.type);
  const genres = Array.isArray(v.genre) ? v.genre.slice(0,3).map(g => `<span class="tag">${g}</span>`).join("") : "";
  const nights = Array.isArray(v.nights) ? v.nights.slice(0,3).join(" · ") : (v.nights||"");
  const savedMark = isSaved(v) ? "★" : "☆";

  return `
  <div class="venue-card" data-action="open-venue" data-name="${encodeURIComponent(v.name)}">
    <div class="venue-img-placeholder">${emoji}</div>
    <div class="venue-body">
      <div class="type-badge" style="background:${color}25;color:${color}">${v.type||"venue"}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="venue-name">${v.name}</div>
        <button class="save-btn" data-action="toggle-save" data-name="${encodeURIComponent(v.name)}" style="color:${isSaved(v)?'#C9A84C':'#333'}">${savedMark}</button>
      </div>
      <div class="venue-meta">📍 ${[v.area, v.city].filter(Boolean).join(", ")}</div>
      ${genres ? `<div class="venue-tags">${genres}</div>` : ""}
      <div class="venue-footer">
        <div>
          ${v.fee ? `<div class="fee">💰 ${v.fee}</div>` : ""}
          ${nights ? `<div class="nights">🌙 ${nights}</div>` : ""}
        </div>
        ${v.rating ? `<div class="rating-badge">★ ${v.rating}</div>` : ""}
      </div>
    </div>
  </div>`;
}

// SERVICE LIST
function buildServiceList() {
  const c = COUNTRIES.find(x => x.id === state.selectedCountry);
  if (!c) {
    const cards = COUNTRIES.map(c => {
      const count = venuesForCountry(c.id).filter(v =>
        ["music shop","service center"].includes((v.type||"").toLowerCase())
      ).length;
      return `
      <div class="country-card" data-action="select-country-service" data-id="${c.id}">
        <div class="country-flag">${c.flag}</div>
        <div class="country-name">${c.name}</div>
        <div class="country-count" style="color:${c.color}">${count}</div>
      </div>`;
    }).join("");
    return `<div class="section-title">Выберите страну</div><div class="country-grid">${cards}</div>`;
  }

  let list = venuesForCountry(c.id).filter(v =>
    ["music shop","service center"].includes((v.type||"").toLowerCase())
  );
  if (state.filterType !== "All") list = list.filter(v => v.type.toLowerCase() === state.filterType.toLowerCase());

  const cards = list.length === 0
    ? `<div class="empty-state"><div class="emoji">🔧</div><p>Нет сервисов в этой стране</p></div>`
    : list.map(v => buildVenueCard(v)).join("");

  return `
    <div class="view-header">
      <button class="back-btn" data-action="back-countries-service">← Страны</button>
      <span class="view-title">${c.flag} ${c.name}</span>
    </div>
    <div class="filters">
      <div class="filter-row">
        ${["All","Music Shop","Service Center"].map(t =>
          `<button class="filter-btn ${state.filterType===t?"active":""}" data-action="filter-type" data-val="${t}">${t==="All"?"Все":t}</button>`
        ).join("")}
      </div>
    </div>
    <div class="result-count">${list.length} объектов</div>
    <div class="venues-list">${cards}</div>`;
}

// VENUE DETAIL
function buildVenueDetail(v) {
  const color = typeColor(v.type);
  const emoji = typeEmoji(v.type);
  const genres = Array.isArray(v.genre) ? v.genre.join(", ") : (v.genre||"");
  const nights = Array.isArray(v.nights) ? v.nights.join(", ") : (v.nights||"");

  const contacts = [];
  if (v.whatsapp)  contacts.push({ icon:"💬", type:"WhatsApp",  val: v.whatsapp,  href:`https://wa.me/${v.whatsapp.replace(/\D/g,"")}` });
  if (v.telegram)  contacts.push({ icon:"✈️", type:"Telegram",  val: v.telegram,  href:`https://t.me/${v.telegram.replace("@","")}` });
  if (v.instagram) contacts.push({ icon:"📸", type:"Instagram", val: v.instagram, href:`https://instagram.com/${v.instagram.replace("@","")}` });
  if (v.email)     contacts.push({ icon:"✉️", type:"Email",     val: v.email,     href:`mailto:${v.email}` });
  if (v.line)      contacts.push({ icon:"💚", type:"Line",      val: v.line,      href:`#` });
  if (v.mapurl)    contacts.push({ icon:"🗺️", type:"Maps",      val: "Открыть карту", href: v.mapurl });

  const contactsHTML = contacts.length === 0
    ? `<div style="padding:12px 14px;color:var(--muted);font-size:12px">Контакты доступны в PRO версии</div>`
    : contacts.map(c => `
      <a class="contact-row" href="${c.href}" target="_blank" rel="noreferrer">
        <span class="contact-icon">${c.icon}</span>
        <div class="contact-info">
          <div class="contact-type">${c.type}</div>
          <div class="contact-val">${c.val}</div>
        </div>
        <span class="arrow">→</span>
      </a>`).join("");

  return `
    <div class="view-header">
      <button class="back-btn" data-action="back-venue">← Назад</button>
    </div>
    <div class="detail-view">
      <div class="detail-hero">${emoji}</div>
      <div class="type-badge" style="background:${color}25;color:${color};margin-bottom:8px">${v.type||"venue"}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="detail-name">${v.name}</div>
        <button class="save-btn" data-action="toggle-save" data-name="${encodeURIComponent(v.name)}" style="color:${isSaved(v)?'#C9A84C':'#333'};font-size:24px">${isSaved(v)?"★":"☆"}</button>
      </div>
      <div class="detail-location">📍 ${[v.area, v.city, v.country].filter(Boolean).join(", ")}</div>

      ${v.rating ? `<div class="rating-badge" style="display:inline-block;margin-bottom:14px">★ ${v.rating}</div>` : ""}

      ${v.description ? `<div class="detail-section"><div class="detail-label">О заведении</div><div class="detail-value">${v.description}</div></div>` : ""}
      ${genres ? `<div class="detail-section"><div class="detail-label">Жанры</div><div class="venue-tags">${genres.split(",").map(g=>`<span class="tag">${g.trim()}</span>`).join("")}</div></div>` : ""}
      ${nights ? `<div class="detail-section"><div class="detail-label">Дни работы</div><div class="detail-value">🌙 ${nights}</div></div>` : ""}
      ${v.capacity ? `<div class="detail-section"><div class="detail-label">Вместимость</div><div class="detail-value">👥 ${v.capacity} чел.</div></div>` : ""}
      ${v.fee ? `<div class="detail-section"><div class="detail-label">Гонорар</div><div class="detail-value">💰 ${v.fee}</div></div>` : ""}
      ${v.contactName ? `<div class="detail-section"><div class="detail-label">Контактное лицо</div><div class="detail-value">${v.contactName}${v.contactRole ? ` · ${v.contactRole}` : ""}</div></div>` : ""}

      <div class="detail-section">
        <div class="detail-label">Контакты</div>
        <div class="contacts-block">${contactsHTML}</div>
      </div>
    </div>`;
}

// SAVED
function buildSaved() {
  if (state.saved.length === 0) return `
    <div class="empty-state">
      <div class="emoji">☆</div>
      <p style="margin-top:8px">Нажмите ★ на заведении чтобы сохранить</p>
    </div>`;
  const cards = state.saved.map(v => buildVenueCard(v)).join("");
  return `
    <div class="result-count" style="padding-top:14px">${state.saved.length} сохранено</div>
    <div class="venues-list">${cards}</div>`;
}

// ─── EVENTS ───────────────────────────────────────────────
function attachEvents() {
  document.addEventListener("click", handleClick, { once: true });
  const searchInput = document.querySelector('[data-action="search"]');
  if (searchInput) {
    searchInput.addEventListener("input", e => {
      state.search = e.target.value;
      render();
    });
  }
}

function handleClick(e) {
  const el = e.target.closest("[data-action]");
  if (!el) { attachEvents(); return; }

  const action = el.dataset.action;

  if (action === "nav") {
    state.tab = el.dataset.tab;
    state.selectedCountry = null;
    state.selectedVenue = null;
    state.filterType = "All";
    state.filterCity = "All";
    state.search = "";
    render(); return;
  }

  if (action === "select-country") {
    state.selectedCountry = el.dataset.id;
    state.tab = "venues";
    state.filterType = "All";
    state.filterCity = "All";
    render(); return;
  }

  if (action === "select-country-service") {
    state.selectedCountry = el.dataset.id;
    state.tab = "service";
    state.filterType = "All";
    render(); return;
  }

  if (action === "back-countries") {
    state.selectedCountry = null;
    state.tab = "countries";
    render(); return;
  }

  if (action === "back-countries-service") {
    state.selectedCountry = null;
    state.tab = "service";
    render(); return;
  }

  if (action === "back-venue") {
    state.selectedVenue = null;
    render(); return;
  }

  if (action === "open-venue") {
    const name = decodeURIComponent(el.dataset.name);
    state.selectedVenue = state.venues.find(v => v.name === name) || state.saved.find(v => v.name === name);
    render(); return;
  }

  if (action === "toggle-save") {
    e.stopPropagation();
    const name = decodeURIComponent(el.dataset.name);
    const venue = state.venues.find(v => v.name === name) || state.saved.find(v => v.name === name);
    if (venue) toggleSave(venue);
    return;
  }

  if (action === "filter-type") {
    state.filterType = el.dataset.val;
    render(); return;
  }

  if (action === "filter-city") {
    state.filterCity = el.dataset.val;
    render(); return;
  }

  if (action === "copy-template") {
    const t = TEMPLATES[parseInt(el.dataset.idx)];
    copyToClipboard(t.text, el);
    attachEvents(); return;
  }

  attachEvents();
}
